<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENSAR MEME</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    overflow:hidden;
    font-family:Arial;
    cursor:pointer;
}

.bg{
    position:absolute;
    width:200%;
    height:200%;
    background: radial-gradient(circle,#ff004c,#000 40%),
                radial-gradient(circle,#00ffcc,#000 40%),
                radial-gradient(circle,#ffcc00,#000 40%);
    filter: blur(90px);
    animation:move 4s infinite linear;
}

@keyframes move{
    0%{transform:translate(0,0);}
    50%{transform:translate(-20%,-20%);}
    100%{transform:translate(0,0);}
}

.card{
    position:relative;
    padding:60px;
    text-align:center;
    background:rgba(0,0,0,0.7);
    border:2px solid #00ffcc;
    border-radius:20px;
    box-shadow:0 0 50px #00ffcc;
}

h1{
    font-size:70px;
    color:#00ffcc;
    text-shadow:0 0 20px cyan, 0 0 40px #00ffcc;
    animation:glitch 0.6s infinite alternate;
}

@keyframes glitch{
    0%{transform:translate(0);}
    50%{transform:translate(2px,-2px);}
    100%{transform:translate(-2px,2px);}
}

p{
    color:white;
    font-size:22px;
}

.fire{
    font-size:60px;
    animation:shake 0.3s infinite;
}

@keyframes shake{
    0%{transform:rotate(0);}
    50%{transform:rotate(5deg);}
    100%{transform:rotate(-5deg);}
}

.click{
    position:absolute;
    bottom:20px;
    color:gray;
    font-size:14px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">
    <div class="fire">🔥🤣🔥</div>
    <h1>ENSAR</h1>
    <p>NENENEYE SELAM SÖYLE</p>
    <div class="click">TIKLA MEME SESİ 🔊</div>
</div>

<script>
let audioCtx;

function memeSound(){
    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    // 1. “vine boom” style bass
    let osc1 = audioCtx.createOscillator();
    let gain1 = audioCtx.createGain();

    osc1.type = "sine";
    osc1.frequency.setValueAtTime(80, audioCtx.currentTime);
    osc1.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.3);

    gain1.gain.setValueAtTime(1, audioCtx.currentTime);
    gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);

    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);

    osc1.start();
    osc1.stop(audioCtx.currentTime + 0.3);

    // 2. “pop click meme” ek sesi
    let osc2 = audioCtx.createOscillator();
    let gain2 = audioCtx.createGain();

    osc2.type = "square";
    osc2.frequency.setValueAtTime(600, audioCtx.currentTime);
    osc2.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);

    gain2.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);

    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);

    osc2.start();
    osc2.stop(audioCtx.currentTime + 0.1);
}

document.body.addEventListener("click", memeSound);
</script>

</body>
</html>
