<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENSAR INTRO</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family:Arial;
    cursor:pointer;
    background:black;
}

/* 🎥 VIDEO BACKGROUND */
video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
    filter: brightness(0.5) contrast(1.3) saturate(1.2);
}

/* koyu overlay */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    z-index:-1;
}

/* kart */
.card{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    padding:60px;
    background:rgba(0,0,0,0.7);
    border:2px solid #00ffcc;
    border-radius:20px;
    box-shadow:0 0 60px #00ffcc;
    animation:pop 1s ease;
}

@keyframes pop{
    from{transform:translate(-50%,-50%) scale(0);}
    to{transform:translate(-50%,-50%) scale(1);}
}

h1{
    color:#00ffcc;
    font-size:70px;
    text-shadow:0 0 20px cyan, 0 0 50px #00ffcc;
    animation:glitch 0.6s infinite alternate;
}

@keyframes glitch{
    0%{transform:translate(0);}
    50%{transform:translate(2px,-2px);}
    100%{transform:translate(-2px,2px);}
}

p{
    color:white;
    font-size:22px;
    margin-top:15px;
}

.fire{
    font-size:60px;
    animation:shake 0.3s infinite;
}

@keyframes shake{
    0%{transform:rotate(0);}
    50%{transform:rotate(5deg);}
    100%{transform:rotate(-5deg);}
}

.click{
    color:gray;
    margin-top:10px;
    font-size:14px;
}
</style>
</head>

<body>

<!-- 🎥 ARKA PLAN VİDEO -->
<video autoplay muted loop>
    <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="card">
    <div class="fire">🔥🤣🔥</div>
    <h1>ENSAR</h1>
    <p>NENENEYE SELAM SÖYLE</p>
    <div class="click">TIKLA MEME SESİ 🔊</div>
</div>

<script>
let audioCtx;

function memeSound(){
    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    // meme bass drop
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.setValueAtTime(90, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.25);

    gain.gain.setValueAtTime(1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.25);

    // pop click
    let osc2 = audioCtx.createOscillator();
    let gain2 = audioCtx.createGain();

    osc2.type = "square";
    osc2.frequency.setValueAtTime(700, audioCtx.currentTime);
    osc2.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);

    gain2.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);

    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);

    osc2.start();
    osc2.stop(audioCtx.currentTime + 0.1);
}

document.body.addEventListener("click", memeSound);
</script>

</body>
</html>
