<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENSAR INTRO</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family:Arial;
    cursor:pointer;
    background:black;
}

video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
    filter: brightness(0.5) contrast(1.3) saturate(1.2);
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    z-index:-1;
}

.card{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    padding:60px;
    background:rgba(0,0,0,0.7);
    border:2px solid #00ffcc;
    border-radius:20px;
    box-shadow:0 0 60px #00ffcc;
}

h1{
    color:#00ffcc;
    font-size:70px;
}

p{
    color:white;
    font-size:22px;
}

.click{
    color:gray;
    margin-top:10px;
    font-size:14px;
}
</style>
</head>

<body>

<video id="bgVideo" loop playsinline>
    <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="card">
    <h1>BEYTO</h1>
    <p>NENENe SELAM SÖYLE aslanım</p>
    <div class="click">SESİ BAŞLATMAK İÇİN TIKLA</div>
</div>

<script>
document.body.addEventListener("click", async () => {
    const video = document.getElementById("bgVideo");

    try {
        // önce muted başlat (tarayıcı güvenliği için)
        video.muted = false;

        // bazı browser'larda restart gerekiyor
        await video.play();

    } catch (e) {
        console.log("Play error:", e);

        // fallback: önce muted play sonra unmute
        video.muted = true;
        await video.play();
        setTimeout(() => {
            video.muted = false;
        }, 200);
    }

    document.querySelector(".card").style.display = "none";
});
</script>

</body>
</html>
