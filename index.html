<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENSAR INTRO</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family:Arial;
    background:black;
}

/* VIDEO */
video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
    filter: brightness(0.5) contrast(1.3) saturate(1.2);
}

/* overlay */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    z-index:-1;
}

/* card */
.card{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    padding:60px;
    background:rgba(0,0,0,0.7);
    border:2px solid #00ffcc;
    border-radius:20px;
    box-shadow:0 0 60px #00ffcc;
    animation:pop 1s ease;
}

@keyframes pop{
    from{transform:translate(-50%,-50%) scale(0);}
    to{transform:translate(-50%,-50%) scale(1);}
}

h1{
    color:#00ffcc;
    font-size:70px;
    text-shadow:0 0 20px cyan, 0 0 50px #00ffcc;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{filter:drop-shadow(0 0 10px cyan);}
    to{filter:drop-shadow(0 0 30px #00ffcc);}
}

p{
    color:white;
    font-size:22px;
    margin-top:15px;
}

.fire{
    font-size:60px;
    animation:shake 0.3s infinite;
}

@keyframes shake{
    0%{transform:rotate(0);}
    50%{transform:rotate(3deg);}
    100%{transform:rotate(-3deg);}
}

.click{
    color:gray;
    margin-top:10px;
    font-size:14px;
}
</style>
</head>

<body>

<!-- VIDEO (MUTED ZORUNLU) -->
<video id="bgVideo" autoplay loop muted playsinline>
    <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="card">
    <div class="fire">🔥🤣🔥</div>
    <h1>ENSAR</h1>
    <p>NENENEYE SELAM SÖYLE</p>
    <div class="click">INTRO AKTİF</div>
</div>

<script>
let audioCtx;

function ambientSound(){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // sürekli düşük bass ambience
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = 55;

    gain.gain.value = 0.03; // düşük ses (rahatsız etmez)

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();

    // hafif dalgalanma (cinematic his)
    setInterval(() => {
        osc.frequency.setValueAtTime(
            55 + Math.random() * 5,
            audioCtx.currentTime
        );
    }, 400);
}

window.addEventListener("load", () => {
    const video = document.getElementById("bgVideo");

    // video otomatik oynar (muted zorunlu)
    video.play().catch(()=>{});

    // ambient ses başlat
    try {
        ambientSound();
    } catch(e) {
        console.log("Audio blocked:", e);
    }
});
</script>

</body>
</html>
